plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.apache.kafka:kafka-clients:2.2.1'
    testImplementation 'junit:junit:4.12'
    implementation 'org.slf4j:slf4j-simple:2.0.9'
}

application {
    mainClassName = 'com.linuxacademy.ccdak.consumer.Main'
}